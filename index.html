<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>尚計劃活動相片集</title>
  <script src="./config.js"></script>
  <style>
    :root {
      --ink: #111827;
      --navy: #0c2344;
      --muted: #667085;
      --soft: #f5f6f8;
      --line: #e7e9ee;
      --white: #ffffff;
      --accent: #174ea6;
      --gold: #b4935a;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
      --soft-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .site-header {
      height: 78px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-inner {
      max-width: 1240px;
      height: 100%;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(12,35,68,.18);
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #fff;
      flex: 0 0 auto;
      box-shadow: 0 8px 20px rgba(12,35,68,.08);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 3px;
    }

    .brand-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: var(--navy);
      color: #fff;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .03em;
      line-height: 1.25;
      color: var(--ink);
      white-space: nowrap;
    }

    .brand-subtitle {
      margin-top: 2px;
      font-size: 12px;
      color: #667085;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-mini {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--navy);
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }

    .browse-btn {
      height: 42px;
      border: 1px solid rgba(12,35,68,.12);
      background: var(--navy);
      color: #fff;
      border-radius: 999px;
      padding: 0 18px;
      font-weight: 700;
      letter-spacing: .02em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 12px 22px rgba(12,35,68,.16);
    }

    .hero {
      min-height: 430px;
      position: relative;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      background: #101827;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(90deg, rgba(8,18,33,.84), rgba(8,18,33,.48), rgba(8,18,33,.18)),
        var(--hero-image);
      background-size: cover;
      background-position: center;
      transform: scale(1.02);
    }

    .hero-inner {
      position: relative;
      max-width: 1240px;
      width: 100%;
      margin: 0 auto;
      padding: 74px 28px 64px;
      display: flex;
      align-items: center;
    }

    .hero-copy {
      max-width: 680px;
      color: #fff;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: rgba(255,255,255,.72);
      letter-spacing: .34em;
      margin-bottom: 24px;
    }

    .eyebrow::before {
      content: "";
      width: 48px;
      height: 1px;
      background: rgba(255,255,255,.65);
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
      font-size: clamp(44px, 6vw, 76px);
      line-height: 1.08;
      letter-spacing: .06em;
      font-weight: 500;
    }

    .hero-copy p {
      margin: 24px 0 30px;
      font-size: 18px;
      line-height: 1.9;
      color: rgba(255,255,255,.82);
      max-width: 620px;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.45);
      color: #fff;
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
      font-weight: 700;
      cursor: pointer;
    }

    .toolbar {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 28px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid var(--line);
    }

    .filters {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter {
      border: 0;
      background: transparent;
      padding: 8px 2px;
      color: #475467;
      font-weight: 700;
      cursor: pointer;
      position: relative;
    }

    .filter.active { color: var(--navy); }
    .filter.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: var(--navy);
    }

    .meta-line {
      color: #667085;
      font-size: 14px;
      white-space: nowrap;
    }

    .content {
      max-width: 1240px;
      margin: 0 auto;
      padding: 42px 28px 58px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 26px;
    }

    .section-title {
      font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
      font-size: 34px;
      letter-spacing: .05em;
      font-weight: 500;
      color: var(--navy);
    }

    .section-subtitle {
      margin-top: 7px;
      color: #667085;
      font-size: 15px;
    }

    .search-panel {
      min-width: 280px;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background: #fff;
    }

    .search-panel input {
      border: 0;
      outline: none;
      width: 100%;
      font-size: 14px;
    }

    .status {
      color: #667085;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .album-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 20px;
      align-items: start;
    }

    .album-card {
      grid-column: span 4;
      background: #fff;
      border: 1px solid #eceff4;
      box-shadow: 0 12px 30px rgba(15,23,42,.07);
      transition: transform .22s ease, box-shadow .22s ease;
      overflow: hidden;
      cursor: pointer;
    }

    .album-card:nth-child(1) { grid-column: span 5; }
    .album-card:nth-child(2) { grid-column: span 4; }
    .album-card:nth-child(3) { grid-column: span 3; }
    .album-card:nth-child(4) { grid-column: span 4; }
    .album-card:nth-child(5) { grid-column: span 5; }
    .album-card:nth-child(6) { grid-column: span 3; }

    .album-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .album-cover {
      height: 260px;
      overflow: hidden;
      background: #e9edf3;
      position: relative;
    }

    .album-card:nth-child(1) .album-cover { height: 330px; }
    .album-card:nth-child(3) .album-cover { height: 330px; }
    .album-card:nth-child(5) .album-cover { height: 300px; }

    .album-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .36s ease;
    }

    .album-card:hover .album-cover img { transform: scale(1.04); }

    .album-body {
      padding: 18px 20px 20px;
    }

    .album-kicker {
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .album-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .album-desc {
      color: #667085;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .album-meta {
      color: #667085;
      font-size: 13px;
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .photo-card {
      background: #fff;
      border: 1px solid #eceff4;
      box-shadow: 0 10px 24px rgba(15,23,42,.07);
      overflow: hidden;
      transition: .22s ease;
    }

    .photo-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .photo-cover { height: 220px; background: #e9edf3; overflow: hidden; }
    .photo-cover img { width: 100%; height: 100%; object-fit: cover; transition: .36s ease; }
    .photo-card:hover img { transform: scale(1.04); }
    .photo-body { padding: 14px 16px 16px; }
    .photo-title { font-weight: 700; color: var(--ink); line-height: 1.35; }
    .photo-meta { margin-top: 7px; color: #667085; font-size: 13px; }

    .back-btn {
      display: none;
      margin-bottom: 24px;
      width: max-content;
      color: var(--navy);
      font-weight: 700;
      border-bottom: 1px solid var(--navy);
      padding-bottom: 4px;
    }

    .empty, .error {
      grid-column: 1 / -1;
      padding: 50px 24px;
      text-align: center;
      background: #fafbfc;
      border: 1px dashed #d0d5dd;
      color: #667085;
    }

    .error { color: #b42318; background: #fff7f7; border-color: #fecdca; }

    .footer {
      border-top: 1px solid var(--line);
      background: #f8fafc;
    }

    .footer-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      color: #667085;
      font-size: 13px;
    }

    .footer-brand { font-weight: 700; color: var(--navy); }

    @media (max-width: 980px) {
      .toolbar, .section-head, .footer-inner { flex-direction: column; align-items: flex-start; }
      .meta-line { white-space: normal; }
      .album-card, .album-card:nth-child(n) { grid-column: span 6; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 680px) {
      .site-header { height: auto; }
      .header-inner { padding: 14px 18px; flex-wrap: wrap; }
      .brand-title { white-space: normal; font-size: 14px; }
      .brand-subtitle { white-space: normal; }
      .hero { min-height: 420px; }
      .hero-inner { padding: 58px 20px 48px; }
      h1 { font-size: 44px; }
      .toolbar, .content { padding-left: 20px; padding-right: 20px; }
      .album-card, .album-card:nth-child(n) { grid-column: 1 / -1; }
      .photo-grid { grid-template-columns: 1fr; }
      .search-panel { width: 100%; min-width: 0; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="./">
        <div class="brand-mark" id="brandMark"></div>
        <div>
          <div class="brand-title" id="schoolZh"></div>
          <div class="brand-subtitle" id="schoolEn"></div>
        </div>
      </a>
      <div class="header-actions">
        <button class="search-mini" id="focusSearch" aria-label="搜尋">⌕</button>
        <button class="browse-btn" id="browseBtn">▣ 瀏覽相簿</button>
      </div>
    </div>
  </header>

  <section class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-inner">
      <div class="hero-copy">
        <div class="eyebrow">記錄成長・見證學習・連繫社群</div>
        <h1 id="siteTitle"></h1>
        <p id="siteSubtitle"></p>
        <button class="hero-cta" id="heroCta">探索活動相簿 →</button>
      </div>
    </div>
  </section>

  <section class="toolbar">
    <div class="filters" id="filters"></div>
    <div class="meta-line" id="metaLine">正在整理相簿資料...</div>
  </section>

  <main class="content" id="galleryArea">
    <a class="back-btn" id="backBtn" href="./">返回所有相簿</a>
    <div class="section-head">
      <div>
        <div class="section-title" id="sectionTitle">最新活動相簿</div>
        <div class="section-subtitle" id="sectionSubtitle">以影像記錄學生在尚計劃中的真實學習與成長瞬間。</div>
      </div>
      <label class="search-panel">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="搜尋相簿或相片..." />
      </label>
    </div>
    <div class="status" id="status">正在載入...</div>
    <section class="album-grid" id="grid"></section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <div class="footer-brand" id="footerSchool"></div>
        <div id="footerText"></div>
      </div>
      <div>© 2026 版權所有</div>
    </div>
  </footer>

  <script>
    const CONFIG = window.GALLERY_CONFIG || {};
    const cameraFallback = "url('data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#2f3f55"/></linearGradient></defs><rect width="1600" height="760" fill="url(#g)"/><circle cx="1160" cy="300" r="170" fill="rgba(255,255,255,.10)"/><circle cx="1160" cy="300" r="92" fill="rgba(255,255,255,.13)"/><rect x="1010" y="190" width="300" height="220" rx="28" fill="rgba(255,255,255,.12)"/><rect x="150" y="520" width="430" height="14" rx="7" fill="rgba(255,255,255,.18)"/><rect x="180" y="560" width="320" height="10" rx="5" fill="rgba(255,255,255,.12)"/></svg>`).replace(/'/g,"%27") + "')";

    let albums = [];
    let photos = [];
    let mode = "albums";
    let currentAlbum = null;
    let activeCategory = "全部相簿";

    init();

    function init() {
      document.title = CONFIG.siteTitle || "尚計劃活動相片集";
      setText("schoolZh", CONFIG.schoolNameZh || "香海正覺蓮社佛教普光學校");
      setText("schoolEn", CONFIG.schoolNameEn || "HHCLKA Buddhist Po Kwong School");
      setText("siteTitle", CONFIG.siteTitle || "尚計劃活動相片集");
      setText("siteSubtitle", CONFIG.siteSubtitle || "記錄學生參與尚銀行、網尚店、工作體驗及校園服務的學習歷程。");
      setText("footerSchool", (CONFIG.schoolNameZh || "香海正覺蓮社佛教普光學校") + "｜" + (CONFIG.schoolNameEn || "HHCLKA Buddhist Po Kwong School"));
      setText("footerText", CONFIG.footerText || "HHCLKA Buddhist Po Kwong School");
      renderBrandMark();
      renderFilters();

      document.getElementById("searchInput").addEventListener("input", renderCurrent);
      document.getElementById("browseBtn").addEventListener("click", scrollToGallery);
      document.getElementById("heroCta").addEventListener("click", scrollToGallery);
      document.getElementById("focusSearch").addEventListener("click", () => {
        scrollToGallery();
        setTimeout(() => document.getElementById("searchInput").focus(), 450);
      });

      const albumId = new URLSearchParams(location.search).get("album");
      albumId ? loadAlbum(albumId) : loadAlbums();
    }

    function renderBrandMark() {
      const mark = document.getElementById("brandMark");
      if (CONFIG.logoUrl) {
        mark.innerHTML = `<img src="${escapeAttr(CONFIG.logoUrl)}" alt="校徽" onerror="this.parentElement.innerHTML='<div class=&quot;brand-fallback&quot;>普</div>'">`;
      } else {
        mark.innerHTML = `<div class="brand-fallback">普</div>`;
      }
    }

    function renderFilters() {
      const cats = CONFIG.categories || ["全部相簿", "尚銀行", "網尚店", "工作體驗", "校園服務", "其他"];
      document.getElementById("filters").innerHTML = cats.map((cat, index) => `
        <button class="filter ${index === 0 ? "active" : ""}" data-category="${escapeAttr(cat)}">${escapeHtml(cat)}</button>
      `).join("");

      document.getElementById("filters").addEventListener("click", event => {
        const button = event.target.closest(".filter");
        if (!button) return;
        activeCategory = button.dataset.category;
        document.querySelectorAll(".filter").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        renderCurrent();
      });
    }

    async function loadAlbums() {
      mode = "albums";
      currentAlbum = null;
      photos = [];
      document.getElementById("backBtn").style.display = "none";
      setText("sectionTitle", "最新活動相簿");
      setText("sectionSubtitle", "以影像記錄學生在尚計劃中的真實學習與成長瞬間。");

      try {
        const data = await getJson("albums");
        if (!data.ok) throw new Error(data.error || "API 回傳錯誤");
        albums = Array.isArray(data.albums) ? data.albums : [];
        updateHero(albums.find(album => String(album.featured).toUpperCase() === "TRUE") || albums[0]);
        updateMeta();
        renderAlbums();
      } catch (error) {
        showError(error.message);
      }
    }

    async function loadAlbum(albumId) {
      mode = "photos";
      document.getElementById("backBtn").style.display = "inline-block";

      try {
        const data = await getJson("photos", { albumId });
        if (!data.ok) throw new Error(data.error || "API 回傳錯誤");
        currentAlbum = data.album || { title: "活動相簿", category: "其他" };
        photos = Array.isArray(data.photos) ? data.photos : [];
        setText("sectionTitle", currentAlbum.title || "活動相簿");
        setText("sectionSubtitle", [currentAlbum.dateText, currentAlbum.description].filter(Boolean).join("　"));
        updateHero({
          title: currentAlbum.title,
          description: currentAlbum.description,
          dateText: currentAlbum.dateText,
          category: currentAlbum.category,
          coverUrl: photos[0] ? photos[0].thumbnailUrl : "",
          photoCount: photos.length
        });
        updateMeta();
        renderPhotos();
      } catch (error) {
        showError(error.message);
      }
    }

    function buildApiUrl(action, extra = {}) {
      const params = new URLSearchParams({ action, ...extra });
      if (CONFIG.apiBaseUrl) return CONFIG.apiBaseUrl + "?" + params.toString();
      return "./api?" + params.toString();
    }

    function getJson(action, extra = {}) {
      const url = buildApiUrl(action, extra);
      if (CONFIG.apiMode === "jsonp") return jsonp(url);
      return fetch(url).then(response => response.json());
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callback = "jsonp_cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
        const script = document.createElement("script");
        const join = url.includes("?") ? "&" : "?";
        window[callback] = data => {
          delete window[callback];
          script.remove();
          resolve(data);
        };
        script.onerror = () => {
          delete window[callback];
          script.remove();
          reject(new Error("Apps Script JSONP 載入失敗"));
        };
        script.src = url + join + "callback=" + encodeURIComponent(callback);
        document.body.appendChild(script);
      });
    }

    function updateHero(album) {
      const heroBg = document.getElementById("heroBg");
      if (album && album.coverUrl) {
        heroBg.style.setProperty("--hero-image", `url('${escapeCssUrl(album.coverUrl)}')`);
      } else {
        heroBg.style.setProperty("--hero-image", cameraFallback);
      }
    }

    function updateMeta() {
      const albumCount = mode === "photos" ? 1 : albums.length;
      const photoCount = mode === "photos"
        ? photos.length
        : albums.reduce((sum, album) => sum + Number(album.photoCount || 0), 0);
      const latestDate = mode === "photos"
        ? (photos[0] ? photos[0].updatedAt : "")
        : ([...albums].sort((a, b) => new Date(b.latestUpdated || 0) - new Date(a.latestUpdated || 0))[0] || {}).latestUpdated;
      setText("metaLine", `${albumCount} 個相簿　・　${photoCount} 張相片　・　最近更新 ${formatSmartDate(latestDate)}`);
    }

    function renderCurrent() {
      mode === "albums" ? renderAlbums() : renderPhotos();
    }

    function renderAlbums() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      let list = albums.filter(album => activeCategory === "全部相簿" || album.category === activeCategory);
      if (keyword) {
        list = list.filter(album => [album.title, album.category, album.description, album.dateText].join(" ").toLowerCase().includes(keyword));
      }

      setText("status", list.length ? `已載入 ${list.length} 個相簿` : "暫時未有相簿");
      const grid = document.getElementById("grid");
      grid.className = "album-grid";
      grid.innerHTML = list.length
        ? list.map(renderAlbumCard).join("")
        : `<div class="empty"><strong>暫時未有相簿</strong><br>請在 Google Sheet 的 Albums 工作頁新增資料，並將 published 設為 TRUE。</div>`;
    }

    function renderPhotos() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      let list = [...photos];
      if (keyword) list = list.filter(photo => String(photo.name || "").toLowerCase().includes(keyword));
      setText("status", list.length ? `已載入 ${list.length} 張相片` : "暫時未有相片");
      const grid = document.getElementById("grid");
      grid.className = "photo-grid";
      grid.innerHTML = list.length
        ? list.map(renderPhotoCard).join("")
        : `<div class="empty"><strong>暫時未有相片</strong><br>請把 JPG / PNG 相片放入此活動的 Google Drive Folder。</div>`;
    }

    function renderAlbumCard(album) {
      return `
        <article class="album-card" onclick="location.href='?album=${encodeURIComponent(album.id)}'">
          <div class="album-cover">
            <img src="${escapeAttr(album.coverUrl || "")}" alt="${escapeAttr(album.title || "活動相簿")}" loading="lazy" onerror="this.style.display='none'">
          </div>
          <div class="album-body">
            <div class="album-kicker">${escapeHtml(album.category || "活動相簿")}</div>
            <div class="album-title">${escapeHtml(album.title || "未命名相簿")}</div>
            <div class="album-desc">${escapeHtml(album.description || "此相簿記錄活動中的學習過程與精彩時刻。")}</div>
            <div class="album-meta">
              <span>${escapeHtml(album.dateText || "日期待定")}</span>
              <span>・</span>
              <span>${Number(album.photoCount || 0)} 張相片</span>
              <span>・</span>
              <span>查看相簿 →</span>
            </div>
          </div>
        </article>
      `;
    }

    function renderPhotoCard(photo) {
      return `
        <article class="photo-card">
          <a href="${escapeAttr(photo.viewUrl || "#")}" target="_blank" rel="noopener">
            <div class="photo-cover">
              <img src="${escapeAttr(photo.thumbnailUrl || "")}" alt="${escapeAttr(photo.name || "相片")}" loading="lazy" onerror="this.style.display='none'">
            </div>
            <div class="photo-body">
              <div class="photo-title">${escapeHtml(photo.name || "未命名相片")}</div>
              <div class="photo-meta">${formatDate(photo.updatedAt || photo.createdAt)}</div>
            </div>
          </a>
        </article>
      `;
    }

    function showError(message) {
      const grid = document.getElementById("grid");
      grid.className = "album-grid";
      grid.innerHTML = `<div class="error"><strong>載入失敗</strong><br>${escapeHtml(message)}</div>`;
      setText("status", "請檢查 Google Sheet 及 Apps Script 設定。");
    }

    function scrollToGallery() {
      document.getElementById("galleryArea").scrollIntoView({ behavior: "smooth" });
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function formatDate(value) {
      if (!value) return "日期待定";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "日期待定";
      return date.toLocaleDateString("zh-HK", { year: "numeric", month: "long", day: "numeric" });
    }

    function formatSmartDate(value) {
      if (!value) return "--";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "--";
      return date.toLocaleDateString("zh-HK", { month: "short", day: "numeric" });
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(text) {
      return escapeHtml(text).replaceAll("`", "&#096;");
    }

    function escapeCssUrl(url) {
      return String(url || "").replace(/'/g, "%27").replace(/\)/g, "%29");
    }
  </script>
</body>
</html>

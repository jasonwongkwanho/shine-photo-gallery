<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="尚計劃活動相片集，展示學生活動、工作體驗及校園服務相片。" />
  <title>尚計劃活動相片集</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <script src="./config.js"></script>
  <script defer src="./assets/app.js"></script>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./" aria-label="返回首頁">
          <span class="brand-mark" id="brandMark" aria-hidden="true"></span>
          <span class="brand-text">
            <span class="brand-title" id="schoolZh">香海正覺蓮社佛教普光學校</span>
            <span class="brand-subtitle" id="schoolEn">HHCLKA Buddhist Po Kwong School</span>
          </span>
        </a>
        <nav class="header-actions" aria-label="主要操作">
          <button class="ghost-button" type="button" id="focusSearch">搜尋</button>
          <button class="primary-button" type="button" data-scroll-target="galleryArea">瀏覽相簿</button>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero" id="homeHero">
        <div class="hero-inner">
          <div class="hero-copy">
            <p class="eyebrow">SHINE's PHOTO GALLERY</p>
            <h1 id="siteTitle">尚計劃活動相片集</h1>
            <p id="siteSubtitle">記錄學生的學習歷程，見證每一次參與、嘗試與成長。</p>
          </div>
          <div class="hero-panel" aria-hidden="true">
            <div class="hero-lens"></div>
          </div>
        </div>
      </section>

      <section class="gallery-controls" id="galleryControls" aria-label="相簿篩選及排序">
        <div class="controls-inner">
          <div class="filter-group" id="filters" aria-label="分類篩選"></div>
          <div class="tool-group">
            <label class="search-field">
              <span>搜尋</span>
              <input id="searchInput" type="search" placeholder="輸入相簿名稱、分類或日期" autocomplete="off" />
            </label>
            <label class="select-field">
              <span>排序</span>
              <select id="sortSelect">
                <option value="newest">最新活動</option>
                <option value="oldest">最舊活動</option>
                <option value="photoCount">相片最多</option>
              </select>
            </label>
          </div>
          <p class="meta-line" id="metaLine">正在載入相簿資料...</p>
        </div>
      </section>

      <section class="home-view" id="homeView">
        <div class="content" id="galleryArea">
          <div class="status" id="status" role="status">正在載入...</div>

          <section class="section-block feature-section" aria-labelledby="featuredTitle">
            <div class="section-head">
              <div>
                <p class="section-kicker">Focus Story</p>
                <h2 class="section-title" id="featuredTitle">焦點活動相簿</h2>
              </div>
              <p class="section-note">本期主打活動，以大型攝影專題形式呈現。</p>
            </div>
            <div class="featured-area" id="featuredArea"></div>
          </section>

          <section class="section-block more-section" aria-labelledby="moreTitle">
            <div class="section-head">
              <div>
                <p class="section-kicker">Archive</p>
                <h2 class="section-title" id="moreTitle">更多活動相簿</h2>
              </div>
              <p class="section-note">按分類、日期或相片數量瀏覽公開相簿。</p>
            </div>
            <div class="album-grid" id="albumGrid"></div>
          </section>
        </div>
      </section>

      <section class="album-view" id="albumView" hidden>
        <div class="content">
          <a class="back-link" id="backBtn" href="./">返回所有相簿</a>
          <article class="album-masthead" id="albumMasthead"></article>
          <div class="status" id="photoStatus" role="status">正在載入相片...</div>
          <div class="photo-wall" id="photoGrid"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div>
          <p class="footer-brand" id="footerSchool">香海正覺蓮社佛教普光學校</p>
          <p id="footerText">HHCLKA Buddhist Po Kwong School</p>
        </div>
        <p class="footer-note">公開相片由已審核 Google Drive 相簿提供</p>
      </div>
    </footer>
  </div>
</body>
</html>
